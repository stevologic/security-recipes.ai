      - name: Validate secure context lineage decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          from scripts.evaluate_secure_context_lineage_decision import (
              evaluate_secure_context_lineage_decision,
          )

          ledger = json.loads(Path("data/evidence/secure-context-lineage-ledger.json").read_text(encoding="utf-8"))
          workflow = next(
              row
              for row in ledger["workflow_lineage"]
              if row["workflow_id"] == "vulnerable-dependency-remediation"
          )
          source_ids = workflow["source_ids"][:2]
          source_hashes = [workflow["source_hashes"][source_id] for source_id in source_ids]
          base_request = {
              "agent_id": "sr-agent::vulnerable-dependency-remediation::codex",
              "attestation_decision": "allow_attested_workflow_context",
              "context_package_hash": workflow["context_package_hash"],
              "context_retrieval_decision": "allow_public_context",
              "correlation_id": "ci-lineage-allow",
              "egress_decision": "allow_public_egress_with_citation",
              "handoff_decision": "allow_metadata_handoff",
              "model_route_decision": "allow_guarded_route",
              "model_route_id": workflow["preferred_route_ids"][0],
              "poisoning_scan_state": "clean",
              "receipt_id": workflow["receipt_id"],
              "run_id": "ci-lineage-allow",
              "source_hashes": source_hashes,
              "source_ids": source_ids,
              "telemetry_decision": "telemetry_ready",
              "telemetry_event_id": "otel-ci-lineage-allow",
              "tenant_id": "ci-tenant",
              "trace_id": "trace-ci-lineage-allow",
              "workflow_id": workflow["workflow_id"],
          }

          allow_decision = evaluate_secure_context_lineage_decision(ledger, base_request)
          if allow_decision["decision"] != "allow_lineage_bound_context":
              raise SystemExit(f"expected allow_lineage_bound_context, got {allow_decision['decision']}")

          cross_tenant = evaluate_secure_context_lineage_decision(
              ledger,
              {**base_request, "target_tenant_id": "other-tenant", "correlation_id": "ci-lineage-deny"},
          )
          if cross_tenant["decision"] != "deny_cross_tenant_lineage_reuse":
              raise SystemExit(f"expected deny_cross_tenant_lineage_reuse, got {cross_tenant['decision']}")

          kill_decision = evaluate_secure_context_lineage_decision(
              ledger,
              {**base_request, "contains_secret": True, "correlation_id": "ci-lineage-kill"},
          )
          if kill_decision["decision"] != "kill_session_on_lineage_break":
              raise SystemExit(f"expected kill_session_on_lineage_break, got {kill_decision['decision']}")

          print("Validated secure context lineage runtime decisions.")
          PY

