# ============================================================================
# Build the Hugo site and push the compiled output to the `gh-pages` branch.
#
# After the first successful run, go to:
#   Settings → Pages → Build and deployment
#   Source:  Deploy from a branch
#   Branch:  gh-pages   /   (root)
#
# The `gh-pages` branch is created automatically on first deploy.
#
# This workflow expects the Hugo project to live at the repo root.
# ============================================================================
name: Build & deploy Hugo to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN needs `contents: write` to push to the gh-pages branch.
permissions:
  contents: write

# Don't let two deploys race each other.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Hextra v0.12.2+ uses the `try` template function (added in Hugo
      # 0.142.0) and requires Hugo ≥ 0.146.0 — stay safely above that.
      HUGO_VERSION: 0.147.6
      HUGO_ENVIRONMENT: production
      TZ: UTC
      # Silence the Node.js 20 deprecation warning for third-party actions
      # that haven't shipped a Node.js 24 build yet. Safe to remove once
      # every action below publishes a Node 24–compatible release.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0            # needed for .GitInfo / .Lastmod

      # ----------------------------------------------------------------
      # Verify the root Hugo layout and export paths used by later steps.
      #   steps.hugo-dir.outputs.path    →  "."
      #   steps.hugo-dir.outputs.gomod   →  "go.sum"
      #   steps.hugo-dir.outputs.publish →  "./public"
      # ----------------------------------------------------------------
      - name: Detect Hugo project location
        id: hugo-dir
        run: |
          if [ -f ./hugo.yaml ]; then
            echo "path=."                      >> "$GITHUB_OUTPUT"
            echo "gomod=go.sum"                >> "$GITHUB_OUTPUT"
            echo "publish=./public"            >> "$GITHUB_OUTPUT"
            echo "editprefix=/content"         >> "$GITHUB_OUTPUT"
          else
            echo "::error::Could not find hugo.yaml at the repo root"
            exit 1
          fi

      - name: Setup Go (for Hugo Modules)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # Hugo Modules don't benefit from Go's build cache — and on a fresh
          # fork go.sum may not exist yet, which makes setup-go emit a warning.
          # Turn the cache off to keep the log clean.
          cache: false

      - name: Install Hugo CLI (extended)
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      # ----------------------------------------------------------------
      # Compute the correct baseURL.
      #
      # Custom-domain takes priority: if `static/CNAME` exists in the
      # Hugo project, use its contents as the host and serve from `/`.
      # The CNAME file is also copied to the site root by Hugo's static
      # asset pipeline, which is what tells GitHub Pages to keep the
      # custom-domain binding across `force_orphan: true` deploys —
      # without it, the domain setting is wiped on every push.
      #
      # Otherwise fall back to the GitHub Pages default, computed from
      # the repo context so forks / renames just work without editing
      # hugo.yaml:
      #
      #   User/org page  →  https://<owner>.github.io/
      #   Project page   →  https://<owner>.github.io/<repo>/
      #
      # GitHub Pages hostnames are always lowercase, even when the owner
      # name is mixed case — hence the `tr '[:upper:]' '[:lower:]'`.
      # ----------------------------------------------------------------
      - name: Compute baseURL (custom domain or GitHub Pages)
        id: pages
        run: |
          CNAME_FILE="${{ steps.hugo-dir.outputs.path }}/static/CNAME"
          if [ -s "$CNAME_FILE" ]; then
            # Read the first non-empty line, strip whitespace.
            CUSTOM_HOST="$(grep -v '^[[:space:]]*$' "$CNAME_FILE" | head -n1 | tr -d '[:space:]')"
            BASE_URL="https://${CUSTOM_HOST}/"
            echo "Detected static/CNAME → using custom domain baseURL"
          else
            OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            REPO="${GITHUB_REPOSITORY##*/}"
            REPO_LC="$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
            if [ "$REPO_LC" = "${OWNER_LC}.github.io" ]; then
              BASE_URL="https://${OWNER_LC}.github.io/"
            else
              BASE_URL="https://${OWNER_LC}.github.io/${REPO}/"
            fi
            echo "No static/CNAME — using GitHub Pages default baseURL"
          fi
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "Computed baseURL: ${BASE_URL}"

      - name: Install Hugo modules (Hextra theme)
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: hugo mod get -u

      - name: Validate workflow control plane manifests
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/validate_workflow_control_plane.py \
            --report data/evidence/workflow-control-plane-report.json

      - name: Validate MCP gateway policy pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_mcp_gateway_policy.py --check

      - name: Validate MCP gateway runtime decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_mcp_gateway_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --agent-id sr-agent::vulnerable-dependency-remediation::codex \
            --run-id ci-allow \
            --tool-namespace repo.contents \
            --tool-access-mode write_branch \
            --branch-name sec-auto-remediation/fix-cve \
            --changed-path package.json \
            --changed-path package-lock.json \
            --diff-line-count 120 \
            --gate-phase tool_call \
            --expect-decision allow_scoped_branch

          python3 scripts/evaluate_mcp_gateway_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --agent-id sr-agent::vulnerable-dependency-remediation::codex \
            --run-id ci-deny \
            --tool-namespace repo.contents \
            --tool-access-mode write_branch \
            --branch-name sec-auto-remediation/fix-cve \
            --changed-path .github/workflows/release.yml \
            --diff-line-count 20 \
            --gate-phase tool_call \
            --expect-decision deny

          python3 scripts/evaluate_mcp_gateway_decision.py \
            --workflow-id artifact-cache-quarantine \
            --agent-id sr-agent::artifact-cache-quarantine::codex \
            --run-id ci-hold \
            --tool-namespace registries.quarantine \
            --tool-access-mode approval_required \
            --gate-phase tool_call \
            --expect-decision hold_for_approval

          python3 scripts/evaluate_mcp_gateway_decision.py \
            --workflow-id base-image-remediation \
            --agent-id sr-agent::base-image-remediation::codex \
            --run-id ci-kill \
            --tool-namespace repo.contents \
            --tool-access-mode write_branch \
            --gate-phase runtime \
            --runtime-kill-signal "agent attempts registry write or deployment" \
            --expect-decision kill_session

      - name: Validate MCP connector trust pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_mcp_connector_trust_pack.py --check

      - name: Validate MCP connector intake pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_mcp_connector_intake_pack.py --check

      - name: Validate MCP authorization conformance pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_mcp_authorization_conformance_pack.py --check

      - name: Validate MCP authorization runtime decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_mcp_authorization_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --connector-id repository-contents \
            --namespace repo.contents \
            --requested-access-mode write_branch \
            --resource-indicator https://mcp.security-recipes.ai/mcp \
            --token-audience https://mcp.security-recipes.ai/mcp \
            --token-scope repo.contents:write_branch \
            --expect-decision allow_authorized_mcp_request

          python3 scripts/evaluate_mcp_authorization_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --connector-id repository-contents \
            --namespace repo.contents \
            --requested-access-mode write_branch \
            --token-audience https://wrong.example/mcp \
            --token-scope repo.contents:write_branch \
            --expect-decision deny_unbound_token

          python3 scripts/evaluate_mcp_authorization_decision.py \
            --workflow-id artifact-cache-quarantine \
            --connector-id registry-quarantine \
            --namespace registries.quarantine \
            --requested-access-mode approval_required \
            --resource-indicator https://mcp.security-recipes.ai/mcp \
            --token-audience https://mcp.security-recipes.ai/mcp \
            --token-scope live_funds_movement \
            --expect-decision kill_session_on_secret_or_signer_scope

      - name: Validate agentic assurance pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_assurance_pack.py --check

      - name: Validate agent identity delegation ledger
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agent_identity_ledger.py --check

      - name: Validate agentic red-team drill pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_red_team_drill_pack.py --check

      - name: Validate agentic readiness scorecard
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_readiness_scorecard.py --check

      - name: Validate agent capability risk register
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agent_capability_risk_register.py --check

      - name: Validate agent memory boundary pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agent_memory_boundary_pack.py --check

      - name: Validate agent memory boundary decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_agent_memory_boundary_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --memory-class-id ephemeral-scratchpad \
            --operation write \
            --expect-decision allow_ephemeral_memory

          python3 scripts/evaluate_agent_memory_boundary_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --memory-class-id run-receipt-evidence \
            --operation write \
            --tenant-id tenant-ci \
            --provenance-hash ci-provenance-hash \
            --expect-decision allow_append_only_evidence_memory

          python3 scripts/evaluate_agent_memory_boundary_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --memory-class-id workflow-policy-memory \
            --operation write \
            --provenance-hash ci-policy-hash \
            --expect-decision deny_runtime_memory_write

          python3 scripts/evaluate_agent_memory_boundary_decision.py \
            --workflow-id sensitive-data-remediation \
            --memory-class-id prohibited-memory \
            --operation write \
            --contains-secret \
            --expect-decision kill_session_on_prohibited_memory

      - name: Validate Agentic System BOM
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_system_bom.py --check

      - name: Refresh context poisoning guard pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_context_poisoning_guard_pack.py

      - name: Validate context poisoning guard pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_context_poisoning_guard_pack.py --check

      - name: Refresh context egress boundary pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_context_egress_boundary_pack.py

      - name: Validate context egress boundary pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_context_egress_boundary_pack.py --check --update-if-stale

      - name: Validate context egress boundary decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_context_egress_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --data-class curated_security_guidance \
            --destination-class approved_model_provider \
            --dpa-in-place \
            --zero-data-retention \
            --required-region us \
            --residency-region us \
            --expect-decision allow_public_egress_with_citation

          python3 scripts/evaluate_context_egress_decision.py \
            --workflow-id vulnerable-dependency-remediation \
            --mcp-namespace repo.contents \
            --destination-class approved_model_provider \
            --tenant-id tenant-ci \
            --dpa-in-place \
            --zero-data-retention \
            --required-region us \
            --residency-region us \
            --expect-decision hold_for_redaction_or_dpa

          python3 scripts/evaluate_context_egress_decision.py \
            --workflow-id sensitive-data-remediation \
            --data-class secret_or_token \
            --destination-class external_url_or_webhook \
            --contains-secret \
            --expect-decision kill_session_on_secret_egress

      - name: Refresh secure context trust pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          # Content edits change the source hashes embedded in this generated
          # evidence pack. Refresh it in CI, then keep the check below as the
          # validation gate for malformed or incomplete trust-pack inputs.
          python3 scripts/generate_secure_context_trust_pack.py

      - name: Validate secure context trust pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_secure_context_trust_pack.py --check --update-if-stale

      - name: Validate secure context retrieval decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_secure_context_retrieval.py \
            --workflow-id vulnerable-dependency-remediation \
            --source-id prompt-library-recipes \
            --retrieval-mode workflow_prompt_context \
            --requested-path content/prompt-library/general/base-image-bump.md \
            --expect-decision allow_public_context

          python3 scripts/evaluate_secure_context_retrieval.py \
            --workflow-id sensitive-data-remediation \
            --source-id workflow-control-plane \
            --retrieval-mode policy_context \
            --requested-path data/control-plane/workflow-manifests.json \
            --expect-decision allow_policy_context_with_citation

          python3 scripts/evaluate_secure_context_retrieval.py \
            --workflow-id vulnerable-dependency-remediation \
            --source-id mcp-server-runtime \
            --retrieval-mode tool_contract_context \
            --requested-path mcp_server.py \
            --expect-decision deny_unapproved_workflow_context

          python3 scripts/evaluate_secure_context_retrieval.py \
            --workflow-id vulnerable-dependency-remediation \
            --source-id prompt-library-recipes \
            --retrieval-mode workflow_prompt_context \
            --data-class private_key \
            --expect-decision kill_session_on_prohibited_context

      - name: Refresh secure context attestation pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_secure_context_attestation_pack.py

      - name: Validate secure context attestation pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_secure_context_attestation_pack.py --check

      - name: Validate secure context attestation decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_context_attestation_decision.py \
            --subject-type context_source \
            --source-id prompt-library-recipes \
            --environment open_reference \
            --expect-decision allow_attested_context

          python3 scripts/evaluate_context_attestation_decision.py \
            --subject-type workflow_context_package \
            --workflow-id vulnerable-dependency-remediation \
            --environment production_mcp \
            --expect-decision hold_for_signature

          python3 scripts/evaluate_context_attestation_decision.py \
            --subject-type context_source \
            --source-id prompt-library-recipes \
            --data-class raw_access_token \
            --expect-decision kill_session_on_forbidden_attestation

      - name: Refresh agentic threat radar
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_threat_radar.py

      - name: Validate agentic threat radar
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_threat_radar.py --check

      - name: Refresh agent skill supply-chain pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agent_skill_supply_chain_pack.py

      - name: Validate agent skill supply-chain pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agent_skill_supply_chain_pack.py --check

      - name: Validate agent skill runtime decisions
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_agent_skill_supply_chain_decision.py \
            --skill-id sr-secure-context-retrieval-skill \
            --operation run \
            --workflow-id vulnerable-dependency-remediation \
            --platform codex \
            --expect-decision allow_pinned_readonly_skill

          python3 scripts/evaluate_agent_skill_supply_chain_decision.py \
            --skill-id sr-cve-remediation-skill \
            --operation run \
            --workflow-id vulnerable-dependency-remediation \
            --platform codex \
            --sandboxed \
            --expect-decision allow_guarded_skill

          python3 scripts/evaluate_agent_skill_supply_chain_decision.py \
            --skill-id sr-artifact-quarantine-operator-skill \
            --operation run \
            --workflow-id artifact-cache-quarantine \
            --platform claude \
            --sandboxed \
            --human-approval-id ci-approval \
            --expect-decision allow_guarded_skill

          python3 scripts/evaluate_agent_skill_supply_chain_decision.py \
            --skill-id untrusted-marketplace-shell-skill \
            --operation run \
            --permission filesystem_read="~/**,.env,**/*.pem" \
            --permission network_egress="*" \
            --permission shell=true \
            --expect-decision kill_session_on_malicious_skill_signal

      - name: Refresh agentic run receipt pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_run_receipt_pack.py

      - name: Validate agentic run receipt pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_run_receipt_pack.py --check --update-if-stale

      - name: Refresh agentic measurement probe pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_measurement_probe_pack.py

      - name: Validate agentic measurement probe pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_measurement_probe_pack.py --check

      - name: Refresh secure context eval pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_secure_context_eval_pack.py

      - name: Validate secure context eval pack
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_secure_context_eval_pack.py --check

      - name: Validate secure context eval runtime case
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/evaluate_secure_context_eval_case.py \
            --scenario-id ctx-eval-prohibited-data-kill \
            --answer-text "kill_session" \
            --expect-decision eval_ready

      - name: Refresh agentic control plane blueprint
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_control_plane_blueprint.py

      - name: Validate agentic control plane blueprint
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 scripts/generate_agentic_control_plane_blueprint.py --check

      - name: Build site
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          # Dynamic repo URL — threaded into `params.repoURL` so the landing
          # page's Repository / Contribute links track whichever repo is
          # hosting this site. No manual hugo.yaml edit required when you fork.
          HUGO_PARAMS_REPOURL: "https://github.com/${{ github.repository }}"
        run: |
          # Rewrite hard-coded canonical repo references in hugo.yaml
          # (repo URL, Contribute menu URL, sidebar Contribute) so every link
          # tracks whichever repo is hosting this site. Nested params and YAML
          # `url:` fields can't be overridden via HUGO_PARAMS_* env vars, so we
          # patch the YAML directly. Keep the legacy name here so older forks
          # still self-heal during deploy.
          CANONICAL_REPOSITORY="stevologic/security-recipes.ai"
          LEGACY_REPOSITORY="stevologic/agentic-remediation-recipes"
          sed -i \
            -e "s|${CANONICAL_REPOSITORY}|${{ github.repository }}|g" \
            -e "s|${LEGACY_REPOSITORY}|${{ github.repository }}|g" \
            hugo.yaml
          # Same substitution across any markdown content that hard-links back
          # to the canonical repo (e.g. the Contribute page pointing at
          # CONTRIBUTING.md).
          find content -type f -name "*.md" -exec sed -i \
            -e "s|${CANONICAL_REPOSITORY}|${{ github.repository }}|g" \
            -e "s|${LEGACY_REPOSITORY}|${{ github.repository }}|g" {} +
          # Refresh the editURL branch segment so "Edit on GitHub" points at
          # the actual deploy branch and root-level content directory.
          sed -i "s|/edit/main/content|/edit/${{ github.ref_name }}${{ steps.hugo-dir.outputs.editprefix }}|g" hugo.yaml

          # Belt-and-braces: ALSO rewrite the top-level baseURL value inside
          # hugo.yaml itself (not just pass --baseURL). The --baseURL CLI flag
          # alone fixes `relURL` / `absURL` output, but some Hextra internals
          # (certain menu renderers, pageRef resolution corner cases) read
          # site.BaseURL directly from config rather than from the CLI
          # override — so patching hugo.yaml too guarantees every code path
          # sees the correct GitHub Pages subpath.
          # The sed below matches `baseURL:` at column 0 followed by any
          # quoted value, regardless of scheme/host/path, so it works on
          # forks without edits. `|` is used as the sed delimiter so the
          # URL's own forward slashes don't need escaping.
          sed -i -E "s|^baseURL:[[:space:]]*\"[^\"]*\"|baseURL: \"${{ steps.pages.outputs.base_url }}\"|" hugo.yaml
          echo "--- Rewritten baseURL line in hugo.yaml: ---"
          grep "^baseURL:" hugo.yaml || true

          # ------------------------------------------------------------------
          # Rewrite absolute card links so Hextra's `{{< card link="/..." >}}`
          # shortcode resolves to the GitHub Pages subpath instead of the
          # host root.
          #
          # Hextra's card shortcode emits the `link=` value verbatim into the
          # anchor's `href`, without passing it through `relURL`. On a user /
          # org page deploy (baseURL = https://<owner>.github.io/) that's
          # fine — but on a project page deploy (baseURL =
          # https://<owner>.github.io/<repo>/) an `href="/prompt-library/..."`
          # resolves to https://<owner>.github.io/prompt-library/... and 404s.
          #
          # Fixing this at the content layer (rather than overriding the card
          # shortcode) keeps Hextra's original card HTML / CSS untouched.
          # It's also self-contained per build: the source markdown on disk
          # still uses clean absolute paths, so localhost / Docker builds
          # (BASE_URL=/) skip the rewrite entirely and nothing changes.
          # ------------------------------------------------------------------
          BASE_URL="${{ steps.pages.outputs.base_url }}"
          BASE_PATH=$(printf '%s' "$BASE_URL" | sed -E 's|^https?://[^/]+||; s|/$||')
          if [ -n "$BASE_PATH" ]; then
            echo "--- Prepending BASE_PATH=$BASE_PATH to card link=\"/...\" paths ---"
            # First pass: prepend the base path to every link="/..." occurrence.
            find content -type f -name "*.md" -exec sed -i -E \
              "s|link=\"/|link=\"${BASE_PATH}/|g" {} +
            # Second pass (idempotency): collapse accidental double-prefix
            # if a contributor ever hardcoded the repo path in a link.
            find content -type f -name "*.md" -exec sed -i -E \
              "s|link=\"${BASE_PATH}${BASE_PATH}/|link=\"${BASE_PATH}/|g" {} +
            echo "--- Sample rewritten card links (for verification): ---"
            grep -r "link=\"${BASE_PATH}" content --include="*.md" | head -5 || true
          else
            echo "--- BASE_PATH is empty (user/org page deploy) — skipping card link rewrite ---"
          fi

          # Override baseURL at build time so fingerprinted asset URLs
          # (CSS / JS / images) match the actual GitHub Pages host +
          # path. If the hugo.yaml baseURL is stale (e.g. a fork), this
          # is what prevents an unstyled deploy.
          hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}"
          # Belt-and-braces: tell GitHub Pages not to run the output through Jekyll.
          touch public/.nojekyll

      - name: Verify MCP recipes index artifact
        working-directory: ${{ steps.hugo-dir.outputs.path }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          index_path = Path("public/recipes-index.json")
          if not index_path.exists() or index_path.stat().st_size == 0:
              raise SystemExit("public/recipes-index.json is missing or empty")

          docs = json.loads(index_path.read_text(encoding="utf-8"))
          if not isinstance(docs, list) or not docs:
              raise SystemExit("recipes-index.json must be a non-empty JSON array")

          required = {"slug", "title", "url", "content"}
          missing = required - set(docs[0].keys())
          if missing:
              raise SystemExit(f"recipes-index.json is missing required fields: {sorted(missing)}")

          print(f"Validated public/recipes-index.json with {len(docs)} documents.")
          PY

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.hugo-dir.outputs.publish }}
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "deploy: ${{ github.event.head_commit.message || github.sha }}"
          # Replace history each deploy so gh-pages stays tiny.
          force_orphan: true
