# ----------------------------------------------------------------------------
# Theme params
# ----------------------------------------------------------------------------
params:
  description: >
    A curated, community-driven library of recipes that turn the AI assistants
    engineers already use — GitHub Copilot, Devin, Cursor, Codex, and
    Claude — into autonomous remediators.

  # Repository URL — dynamic.
  # Override in CI with HUGO_PARAMS_REPOURL=https://github.com/<owner>/<repo>
  # so the site tracks whichever repo is hosting it.
  repoURL: "https://github.com/stevologic/agentic-remediation-recipes"

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo.svg
      # link: /
      # width: 40
      # height: 20

  theme:
    # Options: light, dark, system
    default: dark
    displayToggle: true

  footer:
    displayCopyright: true
    displayPoweredBy: false
    copyright: "© 2026 Agentic Remediation Recipes · An open, community-driven playbook for security engineering teams"

  # Page displays & behaviour
  page:
    width: normal       # normal | wide | full

  # Display TOC on the right
  toc:
    displayTags: true

  # Edit on GitHub links — disabled. We don't want an external
  # callout to github.com injected into every page's header.
  editURL:
    enable: false

  # Built-in search
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward
